<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · Page Not Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #040d17;
            color: #edf2f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-container {
            max-width: 500px;
            padding: 2rem;
        }
        .error-container .code {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #7bc5ff, #40a4d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }
        .error-container h1 {
            font-size: 1.8rem;
            margin: 1rem 0;
        }
        .error-container p {
            color: rgba(220,240,255,0.7);
            margin-bottom: 2rem;
        }
        .error-container .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: linear-gradient(105deg, #236b9e, #164f73);
            border: 1px solid rgba(123,197,255,0.3);
            border-radius: 40px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .error-container .btn:hover {
            background: #2c8fc9;
            transform: translateY(-2px);
        }
        .error-container .icon {
            font-size: 4rem;
            color: rgba(64,164,212,0.3);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="icon"><i class="fas fa-compass"></i></div>
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/home" class="btn"><i class="fas fa-home"></i> Return Home</a>
    </div>
</body>
</html>
